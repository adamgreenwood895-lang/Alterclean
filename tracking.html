<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .tracking-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .tracking-card {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 30px 26px;
      box-sizing: border-box;
      backdrop-filter: blur(18px);
    }

    .tracking-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .tracking-subtitle {
      color: rgba(255,255,255,0.65);
      margin-bottom: 34px;
      line-height: 1.5;
    }

    .step {
      position: relative;
      padding-left: 36px;
      margin-bottom: 28px;
      color: rgba(255,255,255,0.35);
      transition: color 0.6s ease;
    }

    .step::before {
      content: "";
      position: absolute;
      left: 0;
      top: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.6s ease, transform 0.6s ease;
    }

    .step.active {
      color: white;
    }

    .step.active::before {
      background: white;
      transform: scale(1.15);
    }
  </style>
</head>
<body>

  <div class="tracking-page">
    <div class="tracking-card">
      <div class="tracking-title">Order Confirmed</div>
      <div class="tracking-subtitle">Your order is now being processed.</div>

      <div class="step active">Preparing your order</div>
      <div class="step">Packed</div>
      <div class="step">Out for delivery</div>
      <div class="step">Delivered</div>
    </div>
  </div>

  <script>
    const steps = document.querySelectorAll(".step");

    let current = 0;

    setInterval(() => {
      if (current < steps.length - 1) {
        current++;
        steps[current].classList.add("active");
      }
    }, 2500);
  </script>

</body>
</html>
