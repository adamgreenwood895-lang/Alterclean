<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .payment-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .payment-card {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 28px;
      box-sizing: border-box;
      backdrop-filter: blur(18px);
    }

    .payment-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .payment-price {
      color: rgba(255,255,255,0.65);
      margin-bottom: 30px;
      font-size: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field input {
      width: 100%;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
    }

    .pay-button {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="payment-page">
    <div class="payment-card">
      <div class="payment-title">Payment</div>
      <div class="payment-price" id="paymentPrice"></div>

      <div class="field">
        <input type="text" placeholder="Cardholder Name">
      </div>

      <div class="field">
        <input type="text" placeholder="Card Number">
      </div>

      <div class="field">
        <input type="text" placeholder="Expiry Date">
      </div>

      <div class="field">
        <input type="text" placeholder="CVV">
      </div>

      <button class="pay-button" id="payButton">Pay Now</button>
    </div>
  </div>

  <script>
    const product = JSON.parse(localStorage.getItem("selectedProduct"));

    if (!product) {
      window.location.href = "products.html";
    }

    document.getElementById("paymentPrice").textContent = `${product.name} • ${product.price}`;

    document.getElementById("payButton").addEventListener("click", () => {
      window.location.href = "tracking.html";
    });
  </script>

</body>
</html>
